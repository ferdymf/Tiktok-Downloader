    <style>
      /* ============================================
         BASE & RESET
      ============================================ */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        scroll-behavior: smooth;
        overscroll-behavior: none;
        /* Render teks lebih tajam di mobile */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        color: #f0f0f8;
        /* Fallback font jika Google Fonts gagal dimuat */
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          sans-serif;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      ::-webkit-scrollbar {
        width: 0;
        height: 0;
        background: transparent;
      }

      /* Touch: eliminasi delay 300ms, tetap izinkan scroll */
      a,
      button,
      [role="button"],
      input,
      select,
      textarea,
      label {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }

      /* Minimum touch target 44px (Apple HIG) */
      button,
      [role="button"],
      a {
        min-height: 44px;
        min-width: 44px;
      }

      /* Cegah zoom saat input difokus di iOS */
      @media (max-width: 768px) {
        input,
        select,
        textarea {
          font-size: 16px !important;
        }
      }

      /* ============================================
         HAPUS EFEK BLUR DEKORATIF
         Blur berat (blur-[120px], blur-[100px]) pada
         elemen background sangat membebani GPU di HP
         mid-low end. Override semua blur decorative.
      ============================================ */
      .blur-\[120px\],
      .blur-\[100px\],
      .blur-\[80px\],
      .blur-\[60px\] {
        filter: none !important;
        -webkit-filter: none !important;
      }

      /* Sembunyikan elemen background dekoratif sepenuhnya
         di HP agar tidak buang resource render */
      @media (max-width: 768px) {
        .fixed.inset-0.opacity-30,
        .absolute.rounded-full.blur-\[120px\],
        .absolute.rounded-full.blur-\[100px\] {
          display: none !important;
        }
      }

      /* ============================================
         MOBILE OPTIMIZATIONS
      ============================================ */

      /* Teks lebih mudah dibaca di layar kecil */
      @media (max-width: 640px) {
        html {
          font-size: 15px;
        }

        /* Pastikan konten tidak terlalu mepet ke tepi layar */
        .max-w-md {
          padding-left: 16px !important;
          padding-right: 16px !important;
        }

        /* Input area lebih nyaman disentuh */
        input[type="text"],
        input[type="url"] {
          padding-top: 14px !important;
          padding-bottom: 14px !important;
          line-height: 1.5 !important;
        }

        /* Tombol lebih tebal agar mudah ditekan */
        button[type="submit"],
        button.w-full {
          padding-top: 14px !important;
          padding-bottom: 14px !important;
        }
      }

      /* Perbaiki rendering gambar di semua ukuran */
      img {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
      }

      /* Smooth transition untuk semua elemen interaktif */
      button, a, [role="button"] {
        transition: opacity 0.15s ease, transform 0.15s ease;
        -webkit-transition: opacity 0.15s ease, transform 0.15s ease;
      }

      /* Feedback visual saat tombol ditekan di mobile */

        [role="button"]:active,

          opacity: 0.75;
          transform: scale(0.97);

        }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }

    <!-- GitHub Pages SPA Routing Fix -->
    <script>
      (function () {
        try {
          var redirectData = sessionStorage.getItem('spa_redirect');
          if (redirectData) {
            sessionStorage.removeItem('spa_redirect');
            var data = JSON.parse(redirectData);
            var targetPath = data.path + (data.search || '') + (data.hash || '');
            if (targetPath && targetPath !== '/') {
              window.history.replaceState(null, '', targetPath);
            }
          }
        } catch (e) {}
      })();
    </script>

    <!-- Splash screen -->

    <script>
      /* ============================================
         SPLASH SCREEN
      ============================================ */
      (function () {
        var splash = document.getElementById('splash');

        function hideSplash() {
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 350);
        }

        var fallback = setTimeout(hideSplash, 3000);

        var observer = new MutationObserver(function (mutations) {
          for (var m of mutations) {
            if (m.addedNodes.length > 0) {
              clearTimeout(fallback);
              hideSplash();
              observer.disconnect();
              break;
            }
          }
        });

        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true });
      })();
    </script>

    <script>
      /* ============================================
         INDIKATOR OFFLINE
         Muncul otomatis saat koneksi terputus,
         hilang saat koneksi kembali.
      ============================================ */
      (function () {
        var banner = document.getElementById('offline-banner');

        function showOffline() {
          if (banner) banner.classList.add('visible');
        }

        function hideOffline() {
          if (banner) banner.classList.remove('visible');
        }

        // Cek status awal
        if (!navigator.onLine) showOffline();

        window.addEventListener('offline', showOffline);
        window.addEventListener('online', hideOffline);
      })();
    </script>

    <script>
      /* ============================================
         VALIDASI URL TIKTOK DI FRONTEND
         
         Strategi: intercept klik tombol download di
         fase capture (sebelum React memprosesnya).
         Jika URL tidak valid, tampilkan error dan
         batalkan event agar request ke API tidak dikirim.
         
         Pattern URL TikTok yang valid:
         - tiktok.com/@user/video/123
         - vm.tiktok.com/xxxxx
         - vt.tiktok.com/xxxxx
      ============================================ */
      (function () {
        var TIKTOK_PATTERN = /(?:https?:\/\/)?(?:www\.|vm\.|vt\.)?tiktok\.com\/.+/i;

        var errorEl = null;

        function getErrorEl() {
          if (errorEl) return errorEl;
          errorEl = document.getElementById('url-error-msg');
          return errorEl;
        }

        function showError(msg) {
          var el = getErrorEl();
          if (!el) return;
          el.textContent = msg;
          el.classList.add('visible');
          // Sembunyikan otomatis setelah 4 detik
          setTimeout(function () {
            el.classList.remove('visible');
          }, 4000);
        }

        function hideError() {
          var el = getErrorEl();
          if (el) el.classList.remove('visible');
        }

        function findTikTokInput() {
          // Cari input yang kemungkinan berisi URL TikTok
          var inputs = document.querySelectorAll('input[type="text"], input:not([type])');
          for (var i = 0; i < inputs.length; i++) {
            var ph = (inputs[i].placeholder || '').toLowerCase();
            if (ph.includes('tiktok') || ph.includes('url') || ph.includes('link') || ph.includes('paste')) {
              return inputs[i];
            }
          }
          // Fallback: input pertama di dalam #root
          return document.querySelector('#root input');
        }

        function injectErrorEl(input) {
          if (document.getElementById('url-error-msg')) return;
          var el = document.createElement('div');
          el.id = 'url-error-msg';
          // Sisipkan setelah parent input
          var parent = input.closest('form, [class*="glass"], [class*="rounded"]') || input.parentElement;
          if (parent && parent.parentElement) {
            parent.parentElement.insertBefore(el, parent.nextSibling);
          }
          errorEl = el;
        }

        function validateAndIntercept() {
          var input = findTikTokInput();
          if (!input) return;

          injectErrorEl(input);

          // Hapus error saat user mulai mengetik
          input.addEventListener('input', hideError);

          // Intercept klik tombol submit di fase capture
          document.addEventListener('click', function (e) {
            var btn = e.target.closest('button');
            if (!btn) return;

            // Hanya intercept tombol yang ada di area form input
            var inputParent = input.closest('[class]');
            if (!inputParent || !inputParent.contains(btn)) return;

            var value = (input.value || '').trim();

            // Biarkan jika input kosong: React sudah handle pesan ini
            if (!value) return;

            // Validasi format URL TikTok
            if (!TIKTOK_PATTERN.test(value)) {
              e.stopPropagation();
              e.preventDefault();
              showError('URL tidak valid. Pastikan URL berasal dari TikTok.');
              input.focus();
              return;
            }

            hideError();
          }, true); // true = capture phase, jalan sebelum React
        }

        // Tunggu React mount lalu inject validasi
        var root = document.getElementById('root');
        var initObserver = new MutationObserver(function (mutations, obs) {
          var input = findTikTokInput();
          if (input) {
            validateAndIntercept();
            obs.disconnect();
          }
        });

        if (root) {
          initObserver.observe(root, { childList: true, subtree: true });
        }
      })();
    </script>

    <script>
      /* ============================================
         DETEKSI iOS & PWA STANDALONE
      ============================================ */
      (function () {
        var ua = navigator.userAgent;
        if (/iphone|ipad|ipod/i.test(ua)) {
          document.body.classList.add('ios');
        }
        if (window.navigator.standalone) {
          document.body.classList.add('pwa-standalone');
        }
      })();

      /* ============================================
         SERVICE WORKER REGISTRATION
      ============================================ */
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' })
            .catch(function () {
              // SW gagal: app tetap berfungsi normal
            });
        });
      }
    </script>
