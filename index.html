    <script>
      (function () {

            var data = JSON.parse(redirectData);
            var targetPath = data.path + (data.search || '') + (data.hash || '');
            if (targetPath && targetPath !== '/') {
              window.history.replaceState(null, '', targetPath);
            }
          }
        } catch (e) {}
      })();
    </script>

    <script>
      (function () {
        var splash = document.getElementById('splash');

        function hideSplash() {
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 350);
        }

        var fallback = setTimeout(hideSplash, 3000);

        var observer = new MutationObserver(function (mutations) {
          for (var m of mutations) {
            if (m.addedNodes.length > 0) {
              clearTimeout(fallback);
              hideSplash();
              observer.disconnect();
              break;
            }
          }
        });

        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true });
      })();
    </script>

    ============================================ -->
    <script>
      (function () {
        var banner = document.getElementById('offline-banner');

        function showOffline() { if (banner) banner.classList.add('visible'); }
        function hideOffline() { if (banner) banner.classList.remove('visible'); }

        if (!navigator.onLine) showOffline();
        window.addEventListener('offline', showOffline);
        window.addEventListener('online', hideOffline);
      })();

    <!-- ============================================
         FITUR BARU: PULL-TO-REFRESH
         Aktif hanya di perangkat touch (mobile).
         Threshold 80px. Trigger: reload halaman.
         Tidak aktif saat user sedang scroll konten.
    ============================================ -->
    <script>
      (function () {
        var indicator = document.getElementById('ptr-indicator');
        var spinner   = document.getElementById('ptr-spinner');
        var ptrText   = document.getElementById('ptr-text');

        if (!indicator || !('ontouchstart' in window)) return;

        var THRESHOLD    = 80;   // px tarikan untuk trigger refresh
        var MAX_PULL     = 110;  // px maksimal indikator muncul
        var startY       = 0;
        var currentPull  = 0;
        var isPulling    = false;
        var isRefreshing = false;
        var startScrollY = 0;

        function setIndicatorY(pull) {
          var pct  = Math.min(pull / THRESHOLD, 1);
          var deg  = pct * 180;
          var yPx  = Math.min(pull * 0.6, MAX_PULL * 0.6) - 56;
          indicator.style.transform = 'translateY(' + yPx + 'px)';
          spinner.style.transform   = 'rotate(' + deg + 'deg)';
          ptrText.textContent       = pull >= THRESHOLD ? 'Lepas untuk refresh' : 'Tarik untuk refresh';
        }

        document.addEventListener('touchstart', function (e) {
          if (isRefreshing) return;
          startY       = e.touches[0].clientY;
          startScrollY = window.scrollY;
          isPulling    = false;
          currentPull  = 0;
        }, { passive: true });

        document.addEventListener('touchmove', function (e) {
          if (isRefreshing) return;

          var deltaY = e.touches[0].clientY - startY;

          // Hanya aktif saat: tarik ke bawah + halaman di posisi paling atas
          if (deltaY <= 0 || window.scrollY > 0 || startScrollY > 0) return;

          isPulling   = true;
          currentPull = deltaY;
          setIndicatorY(currentPull);
        }, { passive: true });

        document.addEventListener('touchend', function () {
          if (!isPulling || isRefreshing) return;

          isPulling = false;

          if (currentPull >= THRESHOLD) {
            // Trigger refresh
            isRefreshing = true;
            indicator.classList.add('ptr-releasing', 'ptr-refreshing');
            indicator.style.transform = '';
            ptrText.textContent = 'Memuat ulang...';
            spinner.style.transform = '';

            setTimeout(function () {
              window.location.reload();
            }, 800);
          } else {
            // Kembalikan indikator ke atas
            indicator.classList.add('ptr-releasing');
            indicator.style.transform = 'translateY(-100%)';
            setTimeout(function () {
              indicator.classList.remove('ptr-releasing');
              indicator.style.transform = '';
              spinner.style.transform = '';
              currentPull = 0;
            }, 300);
          }
        }, { passive: true });
      })();
    </script>

    <!-- ============================================
         FITUR BARU: TOMBOL PASTE CLIPBOARD (ICON)
         Inject tombol clipboard icon ke dalam input.
         Menggantikan text "Paste" dengan ikon SVG.
         Gunakan Clipboard API dengan fallback execCommand.
    ============================================ -->
    <script>
      (function () {
        var injected = false;

        // SVG: ikon clipboard
        var iconClipboard = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><path d="M9 12h6M9 16h4"/></svg>';

        // SVG: ikon centang (feedback sukses paste)
        var iconCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

        function findTikTokInput() {
          var inputs = document.querySelectorAll('input[type="text"], input[type="url"], input:not([type])');
          for (var i = 0; i < inputs.length; i++) {
            var ph = (inputs[i].placeholder || '').toLowerCase();
            if (ph.includes('tiktok') || ph.includes('url') || ph.includes('link') || ph.includes('paste')) {
              return inputs[i];
            }
          }
          return document.querySelector('#root input');
        }

        function injectPasteButton(input) {
          if (injected || document.getElementById('paste-btn')) return;

          var parent = input.parentElement;
          if (!parent) return;

          // Bungkus input dengan wrapper relatif jika belum ada
          if (!parent.classList.contains('paste-input-wrapper')) {
            var wrapper = document.createElement('div');
            wrapper.className = 'paste-input-wrapper';
            // Salin style posisi dari parent jika ada
            var computedStyle = window.getComputedStyle(parent);
            wrapper.style.cssText = 'position:relative;display:flex;align-items:center;width:100%;';
            parent.insertBefore(wrapper, input);
            wrapper.appendChild(input);
            parent = wrapper;
          }

          var btn = document.createElement('button');
          btn.id            = 'paste-btn';
          btn.type          = 'button';
          btn.title         = 'Tempel dari clipboard';
          btn.setAttribute('aria-label', 'Tempel URL dari clipboard');
          btn.innerHTML     = iconClipboard;

          btn.addEventListener('click', function (e) {
            e.stopPropagation();

            // Sembunyikan tombol paste bawaan React jika ada (text "Paste")
            hideLegacyPasteBtn();

            function doFeedback(text) {
              if (text) {
                input.value = text;
                // Trigger React onChange agar state React ikut update
                var nativeInputValueSetter = Object.getOwnPropertyDescriptor(
                  window.HTMLInputElement.prototype, 'value'
                ).set;
                nativeInputValueSetter.call(input, text);
                input.dispatchEvent(new Event('input', { bubbles: true }));
                input.dispatchEvent(new Event('change', { bubbles: true }));
              }

              // Feedback visual: tampilkan ikon centang
              btn.innerHTML = iconCheck;
              btn.classList.add('paste-success');

              setTimeout(function () {
                btn.innerHTML = iconClipboard;
                btn.classList.remove('paste-success');
              }, 1500);
            }

            // Clipboard API (modern browsers)
            if (navigator.clipboard && navigator.clipboard.readText) {
              navigator.clipboard.readText()
                .then(function (text) { doFeedback(text.trim()); })
                .catch(function () {
                  // Fallback: fokus input dan minta user paste manual
                  input.focus();
                  doFeedback('');
                });
            } else {
              // Fallback execCommand untuk browser lama
              input.focus();
              document.execCommand('paste');
              doFeedback('');
            }
          });

          parent.appendChild(btn);
          injected = true;
        }

        // Sembunyikan tombol/teks "Paste" bawaan dari React jika ada
        function hideLegacyPasteBtn() {
          var allBtns = document.querySelectorAll('#root button');
          for (var i = 0; i < allBtns.length; i++) {
            var txt = (allBtns[i].textContent || '').trim().toLowerCase();
            if (txt === 'paste' || txt === 'tempel') {
              allBtns[i].style.display = 'none';
            }
          }
        }

        // Tunggu React mount lalu inject tombol
        var root = document.getElementById('root');
        var observer = new MutationObserver(function (mutations, obs) {
          var input = findTikTokInput();
          if (input) {
            injectPasteButton(input);
            hideLegacyPasteBtn();
            // Tetap observe untuk kasus React re-render ulang input
            if (injected) obs.disconnect();
          }
        });

        if (root) {
          observer.observe(root, { childList: true, subtree: true });
        }
      })();
    </script>

    <!-- ============================================
         VALIDASI URL TIKTOK
         PERBAIKAN #5: Satu sistem validasi, bukan dua.
         Sistem ini satu-satunya validasi frontend.
         Pastikan validasi di React dinonaktifkan atau
         dihapus agar tidak konflik.
    ============================================ -->
    <script>
      (function () {
        var TIKTOK_PATTERN = /(?:https?:\/\/)?(?:www\.|vm\.|vt\.)?tiktok\.com\/.+/i;
        var errorEl = null;

        function getErrorEl() {
          if (errorEl) return errorEl;
          errorEl = document.getElementById('url-error-msg');
          return errorEl;
        }

        function showError(msg) {
          var el = getErrorEl();
          if (!el) return;
          el.textContent = msg;
          el.classList.add('visible');
          setTimeout(function () { el.classList.remove('visible'); }, 4000);
        }

        function hideError() {
          var el = getErrorEl();
          if (el) el.classList.remove('visible');
        }

        function findTikTokInput() {
          var inputs = document.querySelectorAll('input[type="text"], input[type="url"], input:not([type])');
          for (var i = 0; i < inputs.length; i++) {
            var ph = (inputs[i].placeholder || '').toLowerCase();
            if (ph.includes('tiktok') || ph.includes('url') || ph.includes('link') || ph.includes('paste')) {
              return inputs[i];
            }
          }
          return document.querySelector('#root input');
        }

        function injectErrorEl(input) {
          if (document.getElementById('url-error-msg')) return;
          var el = document.createElement('div');
          el.id = 'url-error-msg';
          var parent = input.closest('form, [class*="glass"], [class*="rounded"]') || input.parentElement;
          if (parent && parent.parentElement) {
            parent.parentElement.insertBefore(el, parent.nextSibling);
          }
          errorEl = el;
        }

        function validateAndIntercept() {
          var input = findTikTokInput();
          if (!input) return;

          injectErrorEl(input);
          input.addEventListener('input', hideError);

          document.addEventListener('click', function (e) {
            var btn = e.target.closest('button');
            if (!btn) return;
            if (btn.id === 'paste-btn') return; // Jangan intercept tombol paste

            var inputParent = input.closest('[class]');
            if (!inputParent || !inputParent.contains(btn)) return;

            var value = (input.value || '').trim();
            if (!value) return;

            if (!TIKTOK_PATTERN.test(value)) {
              e.stopPropagation();
              e.preventDefault();
              showError('URL tidak valid. Pastikan URL berasal dari TikTok.');
              input.focus();
              return;
            }

            hideError();
          }, true);
        }

        var root = document.getElementById('root');
        var initObserver = new MutationObserver(function (mutations, obs) {
          var input = findTikTokInput();
          if (input) {
            validateAndIntercept();
            obs.disconnect();
          }
        });

        if (root) {
          initObserver.observe(root, { childList: true, subtree: true });
        }
      })();
    </script>

    <!-- ============================================
         DETEKSI iOS & PWA STANDALONE
    ============================================ -->
    <script>
      (function () {
        var ua = navigator.userAgent;
        if (/iphone|ipad|ipod/i.test(ua)) {
          document.body.classList.add('ios');
        }
        if (window.navigator.standalone) {
          document.body.classList.add('pwa-standalone');
        }
      })();
    </script>

    <!-- ============================================
         SERVICE WORKER REGISTRATION
         CATATAN: Ganti 'tiksave-static-v1' di sw.js
         setiap kali Anda deploy versi baru agar cache
         lama tidak dipakai pengguna yang sudah install PWA.
    ============================================ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' })
            .catch(function () {
              // SW gagal: app tetap berfungsi normal
            });
        });
      }
    </script>

  </body>
</html>
