    <style>
      /* ============================================================
         CSS VARIABLES
         Semua nilai spesifik device dipusatkan di sini.
      ============================================================ */
      :root {
        /* AMOLED: hitam murni hemat baterai (piksel off = #000) */
        --bg-primary:    #000000;
        --bg-surface:    #0d0d12;
        --bg-elevated:   #141419;
        --bg-overlay:    #1a1a22;

        --text-primary:  #f2f2fa;
        --text-secondary:#9898b0;
        --text-dim:      #5a5a70;

        --accent:        #6366f1;
        --accent-dim:    rgba(99, 102, 241, 0.2);
        --accent-border: rgba(99, 102, 241, 0.4);
        --success:       #22c55e;
        --danger:        #ef4444;
        --danger-dim:    rgba(239, 68, 68, 0.12);
        --danger-border: rgba(239, 68, 68, 0.3);

        /*
          Touch targets Redmi Note 14 4G (6.67", 76.6mm lebar):
          48px = jari rata-rata nyaman, tidak butuh presisi tinggi.
          56px = tombol aksi utama, mudah dipencet sekali tap.
        */
        --touch-min:     48px;
        --touch-primary: 56px;

        /*
          120Hz animation timing:
          - fast  120ms = 14 frame @ 120Hz, cukup untuk feedback instan
          - normal 200ms = 24 frame @ 120Hz, untuk transisi konten
          - slow   300ms = 36 frame @ 120Hz, untuk masuk/keluar panel
          Semua lebih pendek dari default browser (300ms) yang terasa
          lambat di 120Hz.
        */
        --dur-fast:   120ms;
        --dur-normal: 200ms;
        --dur-slow:   300ms;
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);

        /*
          Layout 393px CSS width (1080px / DPR 2.75).
          Padding 20px lebih lega dari 16px standar
          karena layar 76.6mm fisik punya ruang cukup.
        */
        --max-content: 393px;
        --padding-x:   20px;

        /* Radius lebih besar = terasa lebih modern di AMOLED gelap */
        --radius-sm: 10px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-xl: 24px;
      }

      /* ============================================================
         BASE & RESET
      ============================================================ */
      *, *::before, *::after { box-sizing: border-box; }

      html {
        /*
          395 PPI sangat tajam. 15px base sudah nyaman di layar ini.
          Lock dengan !important agar HyperOS tidak override.
        */
        font-size: 15px !important;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        scroll-behavior: smooth;
        overscroll-behavior: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* GPU compositing layer dari awal render */
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }

      body {
        margin: 0;
        padding: 0;
        /* AMOLED: hitam murni, override dari #0a0a0f */
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family:
          'Inter', -apple-system, BlinkMacSystemFont,
          'Segoe UI', Roboto, sans-serif;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      #root {
        min-height: 100vh;
        /* dvh: akuntansikan gesture bar HyperOS yang dinamis */
        min-height: 100dvh;
        padding-top:    env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left:   env(safe-area-inset-left, 0px);
        padding-right:  env(safe-area-inset-right, 0px);
        background-color: var(--bg-primary);
      }

      ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

      a, button, [role="button"], input, select, textarea, label {
        touch-action: manipulation;
        -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
      }

      button, [role="button"], a {
        min-height: var(--touch-min);
        min-width:  var(--touch-min);
      }

      /* Cegah auto-zoom Chrome Android (font < 16px memicu zoom) */
      input, select, textarea { font-size: 16px !important; }

      /*
        Cegah text selection saat gesture swipe HyperOS.
        HyperOS kadang memicu text selection di scroll cepat.
      */
      * { -webkit-user-select: none; user-select: none; }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }

      /* ============================================================
         AMOLED + GPU OPTIMIZATIONS
      ============================================================ */

      /*
        Mali-G57 MC2 adalah GPU mid-range.
        Blur radius > 40px sangat berat. Hapus semua.
      */
      .blur-\[120px\], .blur-\[100px\], .blur-\[80px\],
      .blur-\[60px\],  .blur-\[40px\],  .blur-\[32px\] {
        filter: none !important;
        -webkit-filter: none !important;
      }

      /* Sembunyikan elemen dekoratif background sepenuhnya */
      .fixed.inset-0.opacity-30,
      .absolute.rounded-full.blur-\[120px\],
      .absolute.rounded-full.blur-\[100px\],
      .absolute.rounded-full.blur-\[80px\] {
        display: none !important;
      }

      /* Override background Tailwind ke AMOLED-friendly */
      .bg-white        { background-color: var(--bg-elevated) !important; }
      .bg-gray-50,
      .bg-gray-100     { background-color: var(--bg-surface) !important; }

      /* ============================================================
         120Hz ANIMATION OVERRIDES
         Persingkat semua transisi dari default 300ms ke variable.
      ============================================================ */
      button, a, [role="button"] {
        transition:
          opacity      var(--dur-fast)   var(--ease-out),
          transform    var(--dur-fast)   var(--ease-out),
          background   var(--dur-fast)   var(--ease-out),
          border-color var(--dur-fast)   var(--ease-out),
          color        var(--dur-fast)   var(--ease-out);
        will-change: transform, opacity;
        transform: translateZ(0);  /* Force GPU layer */
      }

      /* Feedback tekan: instant (60ms = 7 frame di 120Hz) */
      @media (hover: none) {
        button:active, [role="button"]:active, a:active {
          opacity: 0.70;
          transform: scale(0.95) translateZ(0);
          transition-duration: 60ms;
        }
      }

      /* ============================================================
         LAYOUT UNTUK 393px WIDTH, LAYAR 20:9
      ============================================================ */
      .max-w-md {
        padding-left:  var(--padding-x) !important;
        padding-right: var(--padding-x) !important;
        max-width: var(--max-content) !important;
      }

      /* Input URL: lebih tinggi untuk touch comfort */
      input[type="text"], input[type="url"] {
        padding-top:    16px !important;
        padding-bottom: 16px !important;
        line-height:    1.5 !important;
        min-height:     var(--touch-primary);
        border-radius:  var(--radius-md) !important;
      }

      /* Tombol submit: 56px untuk aksi utama */
      button[type="submit"], button.w-full {
        min-height:     var(--touch-primary) !important;
        padding-top:    16px !important;
        padding-bottom: 16px !important;
        border-radius:  var(--radius-md) !important;
      }

      img { image-rendering: -webkit-optimize-contrast; }

      @media (display-mode: standalone) {
        body { padding-top: 0; padding-bottom: 0; }
      }

      /* Layar 20:9 panjang: lebih banyak ruang vertikal */
      @media (min-height: 800px) and (max-width: 430px) {
        .max-w-md { padding-top: 8px !important; }
      }

      /* ============================================================
         SPLASH SCREEN
         Hitam murni di AMOLED = seamless, tidak ada flash warna.
      ============================================================ */
      #splash {
        position: fixed;
        inset: 0;
        background: var(--bg-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
        transition: opacity var(--dur-slow) var(--ease-out);
      }

      #splash.hidden { opacity: 0; pointer-events: none; }

      #splash-logo {
        width: 84px;
        height: 84px;
        border-radius: 20px;
        /* 120Hz: 1.1s lebih responsif dari 1.5s default */
        animation: pulse-logo 1.1s ease-in-out infinite;
      }

      #splash-text {
        color: var(--text-primary);
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      @keyframes pulse-logo {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.93); }
      }

      /* ============================================================
         OFFLINE BANNER
      ============================================================ */
      #offline-banner {
        position: fixed;
        top: max(env(safe-area-inset-top, 0px), 0px);
        left: 0;
        right: 0;
        z-index: 10000;
        background: rgba(10, 10, 15, 0.96);
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        padding: 12px var(--padding-x);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 500;
        transform: translateY(-100%);
        transition: transform var(--dur-normal) var(--ease-out);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      #offline-banner.visible { transform: translateY(0); }

      #offline-banner .offline-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--danger);
        flex-shrink: 0;
        animation: blink-dot 1.3s ease-in-out infinite;
      }

      @keyframes blink-dot {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }

      /* ============================================================
         SW UPDATE BANNER
         Posisi: di atas gesture bar HyperOS (~34px dari bawah)
      ============================================================ */
      #sw-update-banner {
        position: fixed;
        bottom: max(calc(env(safe-area-inset-bottom, 16px) + 16px), 28px);
        left: var(--padding-x);
        right: var(--padding-x);
        z-index: 10000;
        background: var(--bg-overlay);
        border: 1px solid var(--accent-border);
        border-radius: var(--radius-xl);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: var(--text-primary);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
        transform: translateY(calc(100% + 48px));
        transition: transform var(--dur-normal) var(--ease-spring);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      #sw-update-banner.visible { transform: translateY(0); }

      #sw-update-banner .update-icon {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-sm);
        background: var(--accent-dim);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #818cf8;
      }

      #sw-update-banner .update-text { flex: 1; line-height: 1.4; }
      #sw-update-banner .update-text strong { display: block; font-weight: 600; font-size: 13px; }
      #sw-update-banner .update-text span   { font-size: 12px; color: var(--text-secondary); }

      #sw-update-btn {
        min-width: auto;
        min-height: auto;
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
      }

      #sw-update-btn:active { background: #4f46e5; transform: scale(0.94); }

      /* ============================================================
         PULL-TO-REFRESH
      ============================================================ */
      #ptr-indicator {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        left: 0;
        right: 0;
        z-index: 9998;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        height: 52px;
        background: var(--bg-surface);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
        pointer-events: none;
        transform: translateY(-100%);
        will-change: transform;
      }

      #ptr-indicator.ptr-animate {
        transition: transform var(--dur-normal) var(--ease-spring);
      }

      #ptr-indicator.ptr-refreshing {
        transform: translateY(0) !important;
        transition: transform var(--dur-normal) var(--ease-out);
      }

      #ptr-spinner {
        width: 17px;
        height: 17px;
        border: 2px solid rgba(160, 160, 184, 0.15);
        border-top-color: var(--text-secondary);
        border-radius: 50%;
        flex-shrink: 0;
        transition: transform var(--dur-fast) ease, border-color var(--dur-fast) ease;
      }

      #ptr-indicator.ptr-refreshing #ptr-spinner {
        /* 0.55s di 120Hz = sangat smooth */
        animation: ptr-spin 0.55s linear infinite;
        border-color: var(--accent-dim);
        border-top-color: var(--accent);
      }

      @keyframes ptr-spin { to { transform: rotate(360deg); } }

      /* ============================================================
         TOMBOL PASTE (ICON)
         40px: pas untuk jari di layar 6.67"
      ============================================================ */
      #paste-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        width: 40px;
        height: 40px;
        min-width: 40px;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-sm);
        cursor: pointer;
        color: var(--text-secondary);
        padding: 0;
        z-index: 10;
        transform: translateY(-50%) translateZ(0);
        transition:
          background     var(--dur-fast) ease,
          color          var(--dur-fast) ease,
          border-color   var(--dur-fast) ease,
          transform      var(--dur-fast) ease;
        -webkit-tap-highlight-color: rgba(0,0,0,0);
      }

      #paste-btn:active {
        transform: translateY(-50%) scale(0.88) translateZ(0);
        background: rgba(255, 255, 255, 0.11);
        transition-duration: 60ms;
      }

      #paste-btn.paste-success {
        background: rgba(34, 197, 94, 0.13);
        border-color: rgba(34, 197, 94, 0.3);
        color: var(--success);
      }

      #paste-btn.paste-error {
        background: var(--danger-dim);
        border-color: var(--danger-border);
        color: var(--danger);
      }

      #paste-btn svg { width: 17px; height: 17px; pointer-events: none; }

      .paste-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
      }

      /* Geser konten input agar tidak tertutup tombol 40px */
      .paste-input-wrapper input { padding-right: 58px !important; width: 100%; }

      /* ============================================================
         VALIDASI URL
      ============================================================ */
      #url-error-msg {
        display: none;
        margin-top: 8px;
        padding: 10px var(--padding-x);
        background: var(--danger-dim);
        border: 1px solid var(--danger-border);
        border-radius: var(--radius-md);
        font-size: 13px;
        color: #fca5a5;
        text-align: center;
        animation: fade-slide-in var(--dur-fast) var(--ease-out);
      }

      #url-error-msg.visible { display: block; }

      @keyframes fade-slide-in {
        from { opacity: 0; transform: translateY(-5px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ============================================================
         TOAST
         Muncul di atas gesture bar HyperOS
      ============================================================ */
      #tiksave-toast {
        position: fixed;
        bottom: max(calc(env(safe-area-inset-bottom, 0px) + 72px), 80px);
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: var(--bg-overlay);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-md);
        padding: 11px 18px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        z-index: 11000;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity   var(--dur-fast) var(--ease-out),
          transform var(--dur-fast) var(--ease-out);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.55);
        max-width: calc(var(--max-content) - var(--padding-x) * 2);
        text-align: center;
        white-space: normal;
      }

      #tiksave-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ============================================================
         HIGH DPI BORDER TWEAK
         Di 395 PPI, border 1px CSS = ~2.75px fisik = terlihat tebal.
         Gunakan 0.5px untuk elemen dekoratif tipis.
      ============================================================ */
      @media (-webkit-min-device-pixel-ratio: 2.5),
             (min-resolution: 240dpi) {
        #offline-banner,
        #sw-update-banner,
        #ptr-indicator {
          border-width: 0.5px;
        }
      }
    </style>

    <!-- GitHub Pages SPA Routing Fix -->
    <script>
      (function () {
        try {
          var d = sessionStorage.getItem('spa_redirect');
          if (d) {
            sessionStorage.removeItem('spa_redirect');
            var o = JSON.parse(d);
            var p = o.path + (o.search || '') + (o.hash || '');
            if (p && p !== '/') window.history.replaceState(null, '', p);
          }
        } catch (e) {}
      })();
    </script>

    <div id="sw-update-banner" role="status" aria-live="polite" aria-hidden="true">
      <div class="update-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </div>
      <div class="update-text">
        <strong>Versi baru tersedia</strong>
        <span>Tap untuk memuat ulang</span>
      </div>
      <button id="sw-update-btn" type="button">Update</button>
    </div>

    <!-- Pull-to-Refresh -->
    <div id="ptr-indicator" aria-hidden="true">
      <div id="ptr-spinner"></div>
      <span id="ptr-text">Tarik untuk refresh</span>
    </div>

    <!-- Toast -->
    <div id="tiksave-toast" aria-live="assertive" aria-atomic="true"></div>

    <!-- Splash Screen -->
    <div id="splash" aria-hidden="true">
      <img id="splash-logo" src="./icons/icon-192x192.png" alt="" />
      <span id="splash-text">TikSave</span>
    </div>

    <div id="root" aria-live="polite"></div>

    <!-- Splash Screen Logic -->
    <script>
      (function () {
        var splash = document.getElementById('splash');
        function hideSplash() {
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(function () { splash && splash.remove(); }, 350);
        }
        var fallback = setTimeout(hideSplash, 3000);
        new MutationObserver(function (mutations, obs) {
          for (var m of mutations) {
            if (m.addedNodes.length > 0) {
              clearTimeout(fallback); hideSplash(); obs.disconnect(); break;
            }
          }
        }).observe(document.getElementById('root'), { childList: true });
      })();
    </script>

    <!-- Offline Indicator -->
    <script>
      (function () {
        var banner = document.getElementById('offline-banner');
        var show = function () { banner && banner.classList.add('visible'); };
        var hide = function () { banner && banner.classList.remove('visible'); };
        if (!navigator.onLine) show();
        window.addEventListener('offline', show);
        window.addEventListener('online', hide);
      })();
    </script>

    <!-- Toast Helper -->
    <script>
      window.tikToast = (function () {
        var el = document.getElementById('tiksave-toast');
        var timer;
        return function (msg, duration) {
          if (!el) return;
          el.textContent = msg;
          el.classList.add('show');
          clearTimeout(timer);
          timer = setTimeout(function () { el.classList.remove('show'); }, duration || 2500);
        };
      })();
    </script>

    <!-- Pull-to-Refresh -->
    <script>
      (function () {
        var indicator = document.getElementById('ptr-indicator');
        var spinner   = document.getElementById('ptr-spinner');
        var ptrText   = document.getElementById('ptr-text');

        if (!indicator || !('ontouchstart' in window)) return;

        var THRESHOLD   = 80;
        var MAX_HEIGHT  = 52;
        var startY = 0, pull = 0, isPulling = false, refreshing = false, startScroll = 0;

        function updateIndicator(px) {
          var pct = Math.min(px / THRESHOLD, 1);
          /* resistance curve: terasa berat saat mendekati threshold */
          var r = Math.pow(pct, 0.55);
          var y = Math.min(r * MAX_HEIGHT * 1.05, MAX_HEIGHT) - MAX_HEIGHT;
          indicator.style.transform = 'translateY(' + y + 'px)';
          spinner.style.transform   = 'rotate(' + (pct * 215) + 'deg)';
          ptrText.textContent = px >= THRESHOLD ? 'Lepas untuk refresh' : 'Tarik untuk refresh';
        }

        function reset() {
          indicator.classList.add('ptr-animate');
          indicator.style.transform = '';
          spinner.style.transform   = '';
          setTimeout(function () { indicator.classList.remove('ptr-animate'); }, 250);
          isPulling = false; pull = 0;
        }

        document.addEventListener('touchstart', function (e) {
          if (refreshing) return;
          startY = e.touches[0].clientY; startScroll = window.scrollY;
          isPulling = false; pull = 0;
        }, { passive: true });

        document.addEventListener('touchmove', function (e) {
          if (refreshing) return;
          var dy = e.touches[0].clientY - startY;
          if (dy <= 0 || window.scrollY > 0 || startScroll > 0) {
            if (isPulling) reset();
            return;
          }
          isPulling = true; pull = dy;
          updateIndicator(pull);
        }, { passive: true });

        document.addEventListener('touchend', function () {
          if (!isPulling || refreshing) return;
          if (pull >= THRESHOLD) {
            refreshing = true;
            indicator.classList.add('ptr-refreshing');
            indicator.style.transform = '';
            spinner.style.transform   = '';
            ptrText.textContent       = 'Memuat ulang...';
            setTimeout(function () { window.location.reload(); }, 620);
          } else {
            reset();
          }
        }, { passive: true });
      })();
    </script>

    <!-- Paste Button (Icon) -->
    <script>
      (function () {
        var injected = false;

        var IC_CLIPBOARD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><path d="M9 12h6M9 16h4"/></svg>';
        var IC_CHECK     = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        var IC_WARN      = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';

        function findInput() {
          var all = document.querySelectorAll('input[type="text"], input[type="url"], input:not([type])');
          for (var i = 0; i < all.length; i++) {
            var ph = (all[i].placeholder || '').toLowerCase();
            if (ph.includes('tiktok') || ph.includes('url') || ph.includes('link') || ph.includes('paste')) return all[i];
          }
          return document.querySelector('#root input');
        }

        function setReactValue(input, text) {
          var desc = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
          if (desc && desc.set) desc.set.call(input, text);
          input.dispatchEvent(new Event('input',  { bubbles: true }));
          input.dispatchEvent(new Event('change', { bubbles: true }));
        }

        function feedbackBtn(btn, type) {
          btn.innerHTML = type === 'success' ? IC_CHECK : IC_WARN;
          btn.classList.add(type === 'success' ? 'paste-success' : 'paste-error');
          setTimeout(function () {
            btn.innerHTML = IC_CLIPBOARD;
            btn.classList.remove('paste-success', 'paste-error');
          }, 1500);
        }

        function injectPasteBtn(input) {
          if (injected || document.getElementById('paste-btn') || !input.parentElement) return;
          var parent = input.parentElement;
          if (!parent.classList.contains('paste-input-wrapper')) {
            var wrapper = document.createElement('div');
            wrapper.className = 'paste-input-wrapper';
            parent.insertBefore(wrapper, input);
            wrapper.appendChild(input);
            parent = wrapper;
          }
          var btn = document.createElement('button');
          btn.id = 'paste-btn'; btn.type = 'button';
          btn.title = 'Tempel dari clipboard';
          btn.setAttribute('aria-label', 'Tempel URL dari clipboard');
          btn.innerHTML = IC_CLIPBOARD;

          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            document.querySelectorAll('#root button').forEach(function (b) {
              if (b.id === 'paste-btn') return;
              var t = (b.textContent || '').trim().toLowerCase();
              if (t === 'paste' || t === 'tempel') b.style.display = 'none';
            });
            if (navigator.clipboard && navigator.clipboard.readText) {
              navigator.clipboard.readText()
                .then(function (text) {
                  text = text.trim();
                  if (text) { setReactValue(input, text); feedbackBtn(btn, 'success'); }
                  else { feedbackBtn(btn, 'error'); window.tikToast && window.tikToast('Clipboard kosong.'); }
                })
                .catch(function () {
                  feedbackBtn(btn, 'error');
                  window.tikToast && window.tikToast('Izin clipboard ditolak. Tempel manual.');
                  input.focus();
                });
            } else {
              input.focus();
              var ok = document.execCommand('paste');
              feedbackBtn(btn, ok ? 'success' : 'error');
              if (!ok) window.tikToast && window.tikToast('Tempel manual dengan tekan & tahan input.');
            }
          });
          parent.appendChild(btn);
          injected = true;
        }

        new MutationObserver(function (mutations, obs) {
          var input = findInput();
          if (input) { injectPasteBtn(input); if (injected) obs.disconnect(); }
        }).observe(document.getElementById('root'), { childList: true, subtree: true });
      })();
    </script>

    <!-- URL Validation -->
    <script>
      (function () {
        var PATTERN = /(?:https?:\/\/)?(?:www\.|vm\.|vt\.)?tiktok\.com\/.+/i;
        var errEl = null;
        function getErr() { return errEl || (errEl = document.getElementById('url-error-msg')); }
        function showErr(msg) {
          var el = getErr(); if (!el) return;
          el.textContent = msg; el.classList.add('visible');
          setTimeout(function () { el.classList.remove('visible'); }, 4000);
        }
        function hideErr() { var el = getErr(); if (el) el.classList.remove('visible'); }
        function findInput() {
          var all = document.querySelectorAll('input[type="text"], input[type="url"], input:not([type])');
          for (var i = 0; i < all.length; i++) {
            var ph = (all[i].placeholder || '').toLowerCase();
            if (ph.includes('tiktok') || ph.includes('url') || ph.includes('link') || ph.includes('paste')) return all[i];
          }
          return document.querySelector('#root input');
        }
        function injectErrEl(input) {
          if (document.getElementById('url-error-msg')) return;
          var el = document.createElement('div'); el.id = 'url-error-msg';
          var par = input.closest('form, [class*="glass"], [class*="rounded"]') || input.parentElement;
          if (par && par.parentElement) par.parentElement.insertBefore(el, par.nextSibling);
          errEl = el;
        }
        function setup() {
          var input = findInput(); if (!input) return;
          injectErrEl(input);
          input.addEventListener('input', hideErr);
          document.addEventListener('click', function (e) {
            var btn = e.target.closest('button');
            if (!btn || btn.id === 'paste-btn' || btn.id === 'sw-update-btn') return;
            var par = input.closest('[class]');
            if (!par || !par.contains(btn)) return;
            var val = (input.value || '').trim();
            if (!val) return;
            if (!PATTERN.test(val)) {
              e.stopPropagation(); e.preventDefault();
              showErr('URL tidak valid. Pastikan URL berasal dari TikTok.');
              input.focus();
            } else { hideErr(); }
          }, true);
        }
        new MutationObserver(function (mutations, obs) {
          if (findInput()) { setup(); obs.disconnect(); }
        }).observe(document.getElementById('root'), { childList: true, subtree: true });
      })();
    </script>

    <!-- Device Detection -->
    <script>
      (function () {
        var ua   = navigator.userAgent;
        var body = document.body;
        if (/android/i.test(ua))              body.classList.add('android');
        if (/xiaomi|miui|hyperos/i.test(ua))  body.classList.add('xiaomi');
        if (/iphone|ipad|ipod/i.test(ua))     body.classList.add('ios');
        if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
          body.classList.add('pwa-standalone');
        }
        if (window.devicePixelRatio >= 2.5)   body.classList.add('hi-dpr');
      })();
    </script>

    <!-- Service Worker + Update Notification -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' })
            .then(function (reg) {
              setInterval(function () { reg.update(); }, 60 * 60 * 1000);
              reg.addEventListener('updatefound', function () {
                var newSW = reg.installing; if (!newSW) return;
                newSW.addEventListener('statechange', function () {
                  if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                    var banner = document.getElementById('sw-update-banner');
                    var btn    = document.getElementById('sw-update-btn');
                    if (banner) { banner.setAttribute('aria-hidden', 'false'); banner.classList.add('visible'); }
                    if (btn) {
                      btn.addEventListener('click', function () {
                        newSW.postMessage({ type: 'SKIP_WAITING' });
                        banner && banner.classList.remove('visible');
                        navigator.serviceWorker.addEventListener('controllerchange', function () {
                          window.location.reload();
                        });
                      });
                    }
                  }
                });
              });
            })
            .catch(function () {});
        });
      }
    </script>
