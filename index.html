    <!--
      GitHub Pages SPA Routing: Restore redirect dari 404.html
      Script ini harus dijalankan SEBELUM React mount agar
      history.replaceState sudah berjalan saat React Router init.
    -->
    <script>
      (function () {
        try {
          var redirectData = sessionStorage.getItem('spa_redirect');
          if (redirectData) {
            sessionStorage.removeItem('spa_redirect');
            var data = JSON.parse(redirectData);
            var targetPath = data.path + (data.search || '') + (data.hash || '');
            if (targetPath && targetPath !== '/') {
              window.history.replaceState(null, '', targetPath);
            }
          }
        } catch (e) {
          // Abaikan jika sessionStorage tidak tersedia
        }
      })();
    </script>

  <body>
    <div id="splash" aria-hidden="true">
      <img id="splash-logo" src="./icons/icon-192x192.png" alt="" />
      <span id="splash-text">TikSave</span>
    </div>

    <div id="root"></div>

    <script>
      // Sembunyikan splash saat React mount
      (function () {
        var splash = document.getElementById('splash');

        function hideSplash() {
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(function () { splash.remove(); }, 350);
        }

        var fallback = setTimeout(hideSplash, 3000);

        var observer = new MutationObserver(function (mutations) {
          for (var m of mutations) {
            if (m.addedNodes.length > 0) {
              clearTimeout(fallback);
              hideSplash();
              observer.disconnect();
              break;
            }
          }
        });

        var root = document.getElementById('root');
        if (root) observer.observe(root, { childList: true });
      })();
    </script>

    <script>
      // Deteksi iOS dan PWA standalone
      (function () {
        var ua = navigator.userAgent;
        if (/iphone|ipad|ipod/i.test(ua)) {
          document.body.classList.add('ios');
        }
        if (window.navigator.standalone) {
          document.body.classList.add('pwa-standalone');
        }
      })();

      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' })
            .catch(function () {
              // SW gagal: app tetap berfungsi normal
            });
        });
      }
    </script>
