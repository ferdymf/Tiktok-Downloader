<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="robots" content="noindex" />
    <title>TikSave</title>
    <style>
      body {
        margin: 0;
        background-color: #0a0a0f;
      }
    </style>
    <script>
      /*
        GitHub Pages SPA Routing Fix

        GitHub Pages mengembalikan 404 saat user refresh atau
        mengakses URL selain root (misal: /download, /history).

        Alur:
        1. 404.html menyimpan path lengkap ke sessionStorage.
        2. 404.html redirect ke root agar index.html dimuat.
        3. index.html membaca sessionStorage dan React Router
           melanjutkan navigasi ke path yang benar.

        Tidak memerlukan konfigurasi server.
      */
      (function () {
        try {
          var loc = window.location;

          var redirectData = {
            path:   loc.pathname,
            search: loc.search,
            hash:   loc.hash
          };

          sessionStorage.setItem('spa_redirect', JSON.stringify(redirectData));

          // Ambil base path (misal: /Tiktok-Downloader)
          var basePath = loc.pathname.split('/').slice(0, 2).join('/');

          var rootUrl =
            loc.protocol + '//' +
            loc.hostname +
            (loc.port ? ':' + loc.port : '') +
            basePath + '/?p=1';

          loc.replace(rootUrl);
        } catch (e) {
          // Jika gagal (misal: sessionStorage diblokir), redirect ke root saja
          window.location.replace('/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
